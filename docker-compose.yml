services:
  blog-api:
    image: ghcr.io/kmoretti/blog_api:latest
    platform: linux/amd64
    ports:
      - "10024:10024"
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:10024/api/public/verify_conf"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
